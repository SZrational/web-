<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气预报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 20px;
    --radius-sm: 12px;
    --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Weather themes */
  body.theme-clear {
    --bg-start: #1a6fc4; --bg-end: #0a3d7a;
    --card-bg: rgba(255,255,255,0.12);
    --card-border: rgba(255,255,255,0.25);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.75);
    --accent: #ffd97d;
    --badge-bg: rgba(255,217,125,0.2);
    --badge-color: #ffd97d;
    --input-bg: rgba(255,255,255,0.15);
    --orb-color: rgba(255,220,100,0.15);
  }
  body.theme-clouds {
    --bg-start: #6b7ea8; --bg-end: #3d4f6e;
    --card-bg: rgba(255,255,255,0.10);
    --card-border: rgba(255,255,255,0.20);
    --text-primary: #f0f4ff;
    --text-secondary: rgba(240,244,255,0.70);
    --accent: #b8c9e8;
    --badge-bg: rgba(184,201,232,0.2);
    --badge-color: #b8c9e8;
    --input-bg: rgba(255,255,255,0.12);
    --orb-color: rgba(180,200,230,0.12);
  }
  body.theme-rain {
    --bg-start: #2d4a6e; --bg-end: #1a2c42;
    --card-bg: rgba(255,255,255,0.09);
    --card-border: rgba(150,200,255,0.20);
    --text-primary: #ddeeff;
    --text-secondary: rgba(221,238,255,0.70);
    --accent: #7ec8e3;
    --badge-bg: rgba(126,200,227,0.18);
    --badge-color: #7ec8e3;
    --input-bg: rgba(255,255,255,0.10);
    --orb-color: rgba(100,170,220,0.12);
  }
  body.theme-snow {
    --bg-start: #5b7ea0; --bg-end: #2e4a63;
    --card-bg: rgba(255,255,255,0.15);
    --card-border: rgba(255,255,255,0.30);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.75);
    --accent: #e0f0ff;
    --badge-bg: rgba(224,240,255,0.2);
    --badge-color: #e0f0ff;
    --input-bg: rgba(255,255,255,0.18);
    --orb-color: rgba(200,230,255,0.15);
  }
  body.theme-thunderstorm {
    --bg-start: #1c1f33; --bg-end: #0d0f1a;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(180,160,255,0.20);
    --text-primary: #e8e4ff;
    --text-secondary: rgba(232,228,255,0.65);
    --accent: #a78bfa;
    --badge-bg: rgba(167,139,250,0.18);
    --badge-color: #c4b5fd;
    --input-bg: rgba(255,255,255,0.08);
    --orb-color: rgba(130,100,240,0.12);
  }
  body.theme-mist {
    --bg-start: #8a9db5; --bg-end: #5e7287;
    --card-bg: rgba(255,255,255,0.13);
    --card-border: rgba(255,255,255,0.22);
    --text-primary: #f5f8ff;
    --text-secondary: rgba(245,248,255,0.72);
    --accent: #d4e0f0;
    --badge-bg: rgba(212,224,240,0.2);
    --badge-color: #d4e0f0;
    --input-bg: rgba(255,255,255,0.14);
    --orb-color: rgba(200,215,235,0.14);
  }

  body {
    font-family: var(--font-body);
    min-height: 100vh;
    background: linear-gradient(145deg, var(--bg-start, #1a6fc4), var(--bg-end, #0a3d7a));
    color: var(--text-primary, #fff);
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  .bg-orb {
    position: fixed; border-radius: 50%;
    background: var(--orb-color, rgba(255,220,100,0.1));
    pointer-events: none; z-index: 0;
  }
  .orb1 { width: 500px; height: 500px; top: -150px; right: -100px; }
  .orb2 { width: 300px; height: 300px; bottom: 10%; left: -80px; }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* Search */
  .search-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }
  .search-input {
    flex: 1;
    padding: 14px 20px;
    background: var(--input-bg, rgba(255,255,255,0.15));
    border: 1px solid var(--card-border, rgba(255,255,255,0.25));
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: all 0.25s;
    backdrop-filter: blur(8px);
  }
  .search-input::placeholder { color: var(--text-secondary); }
  .search-input:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.2);
  }
  .search-btn {
    padding: 14px 24px;
    background: var(--accent, #ffd97d);
    color: #1a1a1a;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-height: 48px;
  }
  .search-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }

  /* API Key notice */
  .api-notice {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-secondary);
    backdrop-filter: blur(10px);
  }
  .api-notice a { color: var(--accent); text-decoration: none; }
  .api-notice a:hover { text-decoration: underline; }
  .api-key-row { display: flex; gap: 8px; margin-top: 10px; }
  .api-key-input {
    flex: 1; padding: 8px 14px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
  }
  .api-key-input::placeholder { color: var(--text-secondary); }
  .api-key-btn {
    padding: 8px 16px;
    background: var(--accent);
    color: #1a1a1a;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    min-height: 44px;
  }

  /* Main card */
  .weather-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 36px 32px;
    backdrop-filter: blur(16px);
    animation: fadeUp 0.5s ease both;
    margin-bottom: 20px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .city-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .city-name {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.1;
  }
  .city-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 300;
  }
  .datetime {
    text-align: right;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
  }

  .main-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .weather-icon-wrap { flex-shrink: 0; }
  .weather-icon {
    width: 96px; height: 96px;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
  }
  .temp-value {
    font-family: var(--font-display);
    font-size: clamp(3.5rem, 8vw, 5.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
  }
  .temp-feels {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .desc-badge {
    display: inline-block;
    background: var(--badge-bg);
    color: var(--badge-color);
    font-size: 13px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    margin-top: 8px;
    text-transform: capitalize;
    letter-spacing: 0.3px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
  }
  .stat-item {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: var(--radius-sm);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.2s;
  }
  .stat-item:hover { background: rgba(255,255,255,0.12); }
  .stat-icon {
    font-size: 22px;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 3px;
    font-weight: 400;
  }
  .stat-val {
    font-size: 17px;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* Forecast strip */
  .forecast-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 24px 28px;
    backdrop-filter: blur(16px);
    animation: fadeUp 0.55s 0.1s ease both;
  }
  .forecast-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .forecast-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .forecast-day {
    text-align: center;
    padding: 14px 6px;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
  }
  .forecast-day:hover { background: rgba(255,255,255,0.08); }
  .forecast-day-name {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .forecast-day-icon { font-size: 26px; margin-bottom: 8px; display: block; }
  .forecast-day-hi {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .forecast-day-lo {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Error / loading */
  .status-msg {
    text-align: center;
    padding: 32px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    animation: fadeUp 0.4s ease both;
  }
  .status-msg .status-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .status-msg p { color: var(--text-secondary); font-size: 14px; }

  .loader {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* Quick cities */
  .quick-cities {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .quick-city {
    padding: 6px 16px;
    background: var(--input-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-body);
    min-height: 44px;
  }
  .quick-city:hover {
    background: rgba(255,255,255,0.2);
    color: var(--text-primary);
    border-color: var(--accent);
  }

  /* 移动端 & 平板适配 */
  @media (max-width: 480px) {
    .container { padding: 20px 16px 40px; }
    .search-wrap { flex-direction: column; gap: 12px; }
    .search-btn { width: 100%; }
    .weather-card, .forecast-card { padding: 24px 20px; border-radius: 16px; }
    .city-row { flex-direction: column; align-items: center; text-align: center; gap: 12px; }
    .datetime { text-align: center; }
    .main-row { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
    .weather-icon { width: 80px; height: 80px; }
    .temp-value { font-size: clamp(2.8rem, 12vw, 4.2rem); }
    .stats-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
    .forecast-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .orb1 { width: 280px; height: 280px; top: -80px; right: -60px; }
    .orb2 { width: 180px; height: 180px; bottom: 5%; left: -50px; }
  }

  @media (min-width: 481px) and (max-width: 768px) {
    .container { padding: 30px 20px 50px; }
    .forecast-row { grid-template-columns: repeat(3, 1fr); }
    .orb1 { width: 380px; height: 380px; top: -100px; right: -80px; }
    .orb2 { width: 220px; height: 220px; }
  }
</style>
</head>
<body class="theme-clear">
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="container">
  <div class="header">
    <h1>天气预报</h1>
    <p>Weather Forecast · 实时天气查询</p>
  </div>

  <div class="api-notice hidden" id="apiNotice">
    🔑 请先配置 <a href="https://openweathermap.org/api" target="_blank">OpenWeatherMap</a> API Key（免费注册）
    <div class="api-key-row">
      <input class="api-key-input" id="apiKeyInput" type="text" placeholder="输入你的 API Key...">
      <button class="api-key-btn" onclick="saveApiKey()">保存</button>
    </div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="cityInput" type="text" placeholder="输入城市名称，如：Beijing、Tokyo、London..." >
    <button class="search-btn" onclick="search()">查询天气</button>
  </div>

  <div class="quick-cities">
    <button class="quick-city" onclick="quickSearch('Beijing')">北京</button>
    <button class="quick-city" onclick="quickSearch('Shanghai')">上海</button>
    <button class="quick-city" onclick="quickSearch('Changchun')">长春</button>
    <button class="quick-city" onclick="quickGeo(43.88,125.35,'长春朝阳区')">长春朝阳区</button>
    <button class="quick-city" onclick="quickSearch('Tokyo')">东京</button>
    <button class="quick-city" onclick="quickSearch('London')">伦敦</button>
  </div>
  <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;line-height:1.6;">
    💡 提示：输入城市名（如 <b style="color:var(--accent)">Changchun</b>）或坐标（如 <b style="color:var(--accent)">43.88,125.35</b>）可查询区县级天气
  </div>

  <div id="loadingEl" class="status-msg hidden">
    <div class="loader"></div>
    <p>正在获取天气数据...</p>
  </div>

  <div id="errorEl" class="status-msg hidden">
    <span class="status-icon">⚠️</span>
    <p id="errorMsg">查询失败，请检查城市名称或 API Key。</p>
  </div>

  <div id="weatherCard" class="weather-card hidden">
    <div class="city-row">
      <div>
        <div class="city-name" id="cityName">—</div>
        <div class="city-sub" id="countrySub">—</div>
      </div>
      <div class="datetime" id="datetimeEl">—</div>
    </div>
    <div class="main-row">
      <div class="weather-icon-wrap">
        <img class="weather-icon" id="weatherIconImg" src="" alt="天气图标">
      </div>
      <div class="temp-block">
        <div class="temp-value"><span id="tempVal">—</span>°</div>
        <div class="temp-feels" id="feelsLike">体感 —°C</div>
        <div class="desc-badge" id="weatherDesc">—</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-item">
        <span class="stat-icon">🌡️</span>
        <div><div class="stat-label">体感温度</div><div class="stat-val" id="feelsLikeStat">—</div></div>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🌬️</span>
        <div><div class="stat-label">风速</div><div class="stat-val" id="windSpeed">—</div></div>
      </div>
      <div class="stat-item">
        <span class="stat-icon">💧</span>
        <div><div class="stat-label">湿度</div><div class="stat-val" id="humidity">—</div></div>
      </div>
      <div class="stat-item">
        <span class="stat-icon">📊</span>
        <div><div class="stat-label">气压</div><div class="stat-val" id="pressure">—</div></div>
      </div>
    </div>
  </div>

  <div id="forecastCard" class="forecast-card hidden">
    <div class="forecast-title">5日天气预报</div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>
</div>

<script>
  const API_BASE = 'https://api.openweathermap.org/data/2.5';
  let apiKey = localStorage.getItem('owm_api_key') || '6a13e7959074dc22e4b18bc02a9be40b';

  if (apiKey) {
    document.getElementById('apiNotice').classList.add('hidden');
    document.getElementById('apiKeyInput').value = apiKey;
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    apiKey = key;
    localStorage.setItem('owm_api_key', key);
    document.getElementById('apiNotice').classList.add('hidden');
  }

  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  function quickSearch(city) {
    document.getElementById('cityInput').value = city;
    search();
  }

  function quickGeo(lat, lon, label) {
    document.getElementById('cityInput').value = lat + ',' + lon;
    fetchWeatherByGeo(lat, lon, label);
  }

  function search() {
    const input = document.getElementById('cityInput').value.trim();

    if (!input) {
      showEmptyInputPrompt();
      return;
    }

    if (!apiKey) {
      showError('请先配置 API Key！');
      return;
    }

    const coordMatch = input.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
    if (coordMatch) {
      fetchWeatherByGeo(parseFloat(coordMatch[1]), parseFloat(coordMatch[2]));
    } else {
      fetchWeather(input);
    }
  }

  function showEmptyInputPrompt() {
    const errorEl = document.getElementById('errorEl');
    const msgEl = document.getElementById('errorMsg');

    msgEl.innerHTML = '⚠️ 请输入城市名称或经纬度坐标<br><small>例如：北京、Tokyo 或 43.88,125.35</small>';
    errorEl.classList.remove('hidden');

    setTimeout(() => {
      errorEl.classList.add('hidden');
    }, 3500);
  }

  async function fetchWeatherByGeo(lat, lon, customLabel) {
    showLoading();
    try {
      const [currentRes, forecastRes] = await Promise.all([
        fetch(API_BASE+'/weather?lat='+lat+'&lon='+lon+'&appid='+apiKey+'&units=metric&lang=zh_cn'),
        fetch(API_BASE+'/forecast?lat='+lat+'&lon='+lon+'&appid='+apiKey+'&units=metric&lang=zh_cn')
      ]);
      if (!currentRes.ok) { const e = await currentRes.json(); throw new Error(e.message); }
      const current = await currentRes.json();
      const forecast = await forecastRes.json();
      if (customLabel) current._customLabel = customLabel;
      renderCurrent(current);
      renderForecast(forecast);
      showWeather();
    } catch(e) { showError('错误：' + e.message); }
  }

  function showLoading() {
    document.getElementById('loadingEl').classList.remove('hidden');
    document.getElementById('errorEl').classList.add('hidden');
    document.getElementById('weatherCard').classList.add('hidden');
    document.getElementById('forecastCard').classList.add('hidden');
  }

  function showError(msg) {
    document.getElementById('loadingEl').classList.add('hidden');
    document.getElementById('errorEl').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = msg || '查询失败，请重试。';
  }

  function showWeather() {
    document.getElementById('loadingEl').classList.add('hidden');
    document.getElementById('errorEl').classList.add('hidden');
    document.getElementById('weatherCard').classList.remove('hidden');
    document.getElementById('forecastCard').classList.remove('hidden');
    const cards = document.querySelectorAll('.weather-card, .forecast-card');
    cards.forEach(c => { c.style.animation = 'none'; c.offsetHeight; c.style.animation = ''; });
  }

  async function fetchWeather(city) {
    showLoading();
    try {
      const [currentRes, forecastRes] = await Promise.all([
        fetch(`${API_BASE}/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=zh_cn`),
        fetch(`${API_BASE}/forecast?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=zh_cn`)
      ]);

      if (!currentRes.ok) {
        const err = await currentRes.json();
        throw new Error(err.message || '城市未找到');
      }

      const current = await currentRes.json();
      const forecast = await forecastRes.json();
      renderCurrent(current);
      renderForecast(forecast);
      showWeather();
    } catch (e) {
      showError(`错误：${e.message}`);
    }
  }

  function getWeatherTheme(weatherId) {
    if (weatherId >= 200 && weatherId < 300) return 'thunderstorm';
    if (weatherId >= 300 && weatherId < 600) return 'rain';
    if (weatherId >= 600 && weatherId < 700) return 'snow';
    if (weatherId >= 700 && weatherId < 800) return 'mist';
    if (weatherId === 800) return 'clear';
    return 'clouds';
  }

  function windDegToDir(deg) {
    const dirs = ['北','东北','东','东南','南','西南','西','西北'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function renderCurrent(data) {
    const theme = getWeatherTheme(data.weather[0].id);
    document.body.className = `theme-${theme}`;

    document.getElementById('cityName').textContent = data._customLabel || data.name;
    document.getElementById('countrySub').textContent =
      `${data.sys.country} · 海拔 ${data.coord?.lat?.toFixed(1)}°N`;

    const now = new Date();
    document.getElementById('datetimeEl').innerHTML =
      `${now.toLocaleDateString('zh-CN', {month:'short',day:'numeric',weekday:'short'})}<br>${now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}`;

    const iconCode = data.weather[0].icon;
    document.getElementById('weatherIconImg').src =
      `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

    document.getElementById('tempVal').textContent = Math.round(data.main.temp);
    document.getElementById('feelsLike').textContent = `体感 ${Math.round(data.main.feels_like)}°C`;
    document.getElementById('weatherDesc').textContent = data.weather[0].description;

    document.getElementById('feelsLikeStat').textContent = Math.round(data.main.feels_like) + '°C';
    document.getElementById('windSpeed').textContent = data.wind.speed.toFixed(1) + ' m/s';
    document.getElementById('humidity').textContent = data.main.humidity + '%';
    document.getElementById('pressure').textContent = data.main.pressure + ' hPa';
  }

  const WEATHER_EMOJI = {
    '01d':'☀️','01n':'🌙','02d':'⛅','02n':'🌥️',
    '03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️',
    '09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
    '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️',
    '50d':'🌫️','50n':'🌫️'
  };

  function renderForecast(data) {
    const days = {};
    data.list.forEach(item => {
      const date = new Date(item.dt * 1000);
      const key = date.toDateString();
      if (!days[key]) days[key] = { temps: [], icon: item.weather[0].icon, date };
      days[key].temps.push(item.main.temp);
    });

    const entries = Object.values(days).slice(0, 5);
    const weekdays = ['日','一','二','三','四','五','六'];

    document.getElementById('forecastRow').innerHTML = entries.map((d, i) => {
      const hi = Math.round(Math.max(...d.temps));
      const lo = Math.round(Math.min(...d.temps));
      const dayLabel = i === 0 ? '今天' : `周${weekdays[d.date.getDay()]}`;
      const emoji = WEATHER_EMOJI[d.icon] || '🌤️';
      return `
        <div class="forecast-day">
          <div class="forecast-day-name">${dayLabel}</div>
          <span class="forecast-day-icon">${emoji}</span>
          <div class="forecast-day-hi">${hi}°</div>
          <div class="forecast-day-lo">${lo}°</div>
        </div>`;
    }).join('');
  }
</script>
